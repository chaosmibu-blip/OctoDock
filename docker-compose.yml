# OctoDock — One URL. All Apps. Remembers You.
# 🐙 5 分鐘跑起來：docker compose up

services:
  # PostgreSQL + pgvector（記憶層的語意搜尋引擎）
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: octodock
      POSTGRES_USER: octodock
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U octodock"]
      interval: 5s
      timeout: 5s
      retries: 5

  # OctoDock MCP Server
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://octodock:changeme@db:5432/octodock
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      # OAuth — 填入你自己申請的 key
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NOTION_OAUTH_CLIENT_ID: ${NOTION_OAUTH_CLIENT_ID:-}
      NOTION_OAUTH_CLIENT_SECRET: ${NOTION_OAUTH_CLIENT_SECRET:-}
      GMAIL_OAUTH_CLIENT_ID: ${GMAIL_OAUTH_CLIENT_ID:-}
      GMAIL_OAUTH_CLIENT_SECRET: ${GMAIL_OAUTH_CLIENT_SECRET:-}
      META_OAUTH_CLIENT_ID: ${META_OAUTH_CLIENT_ID:-}
      META_OAUTH_CLIENT_SECRET: ${META_OAUTH_CLIENT_SECRET:-}
      # 可選
      OPENAI_EMBEDDING_API_KEY: ${OPENAI_EMBEDDING_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
